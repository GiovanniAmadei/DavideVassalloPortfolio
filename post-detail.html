<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Articolo Blog — Davide Vassallo">
    <title>Blog | Davide Vassallo</title>
    <link rel="stylesheet" href="styles.css?v=11">
    <style>
        .post-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 140px 2.5rem 5rem;
        }

        .post-header {
            margin-bottom: 3rem;
            text-align: center;
        }

        .post-date {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--muted);
            margin-bottom: 1rem;
        }

        .post-title {
            font-size: clamp(2rem, 5vw, 4rem);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 1.1;
        }

        .post-main-image {
            width: 100%;
            margin-bottom: 3rem;
        }

        .post-main-image img {
            width: 100%;
            height: auto;
            display: block;
        }

        .post-content {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--text);
        }

        .post-content p {
            margin-bottom: 1.8rem;
        }

        .post-footer {
            margin-top: 5rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border);
            text-align: center;
        }

        .back-to-blog {
            text-transform: uppercase;
            letter-spacing: 0.15em;
            font-size: 0.85rem;
            color: var(--muted);
            transition: color 0.3s;
        }

        .back-to-blog:hover {
            color: var(--accent-red);
        }

        @media (max-width: 600px) {
            .post-container {
                padding-top: 100px;
                padding-left: 1.5rem;
                padding-right: 1.5rem;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="header-main">
            <a class="header-logo" href="index.html">Davide Vassallo</a>
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="header-nav" id="header-nav">
                <a href="index.html">Home</a>
                <span class="nav-separator">&bull;</span>
                <a href="portfolio.html" id="portfolio-toggle">Portfolio</a>
                <span class="nav-separator">&bull;</span>
                <a href="blog.html" class="active">Blog</a>
                <span class="nav-separator">&bull;</span>
                <a href="about.html">Chi Sono</a>
                <span class="nav-separator">&bull;</span>
                <a href="contact.html">Contatti</a>
            </nav>
            <div class="header-social">
                <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5" />
                        <circle cx="12" cy="12" r="4.5" />
                        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none" />
                    </svg>
                </a>
                <a href="https://linkedin.com" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z" />
                        <rect x="2" y="9" width="4" height="12" />
                        <circle cx="4" cy="4" r="2" />
                    </svg>
                </a>
            </div>
        </div>
    </header>

    <article class="post-container" id="post-content-target">
        <div class="loading-shimmer" style="text-align: center; padding: 5rem; color: var(--muted);">
            Caricamento articolo...
        </div>
    </article>

    <div class="post-footer section">
        <a href="blog.html" class="back-to-blog">← Torna al Blog</a>
    </div>

    <!-- FOOTER -->
    <footer class="site-footer" style="padding: 2.5rem; text-align: center; border-top: 1px solid var(--border);">
        <div
            style="font-size: 0.8rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--text); margin-bottom: 2rem;">
            info@davidevassallo.net <span style="margin: 0 0.8rem; color: var(--muted)">&bull;</span> +39 333 217 4750
            <span style="margin: 0 0.8rem; color: var(--muted)">&bull;</span> Milano, Italia
        </div>
        <div class="footer-content">
            <div class="footer-bottom">&copy; 2026 Davide Vassallo. All rights reserved.</div>
            <a href="http://amadevs.eu" target="_blank" rel="noopener noreferrer" class="footer-powered">
                <span>Powered by</span>
                <img src="assets/amadevs.png" alt="Amadevs">
            </a>
        </div>
    </footer>

    <script src="script.js?v=11"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const target = document.getElementById('post-content-target');

            if (!slug || !target) return;

            try {
                const projectId = 'lbt74p0a';
                const dataset = 'production';
                const query = encodeURIComponent(`*[_type == "post" && slug.current == "${slug}"][0]{
                    title,
                    publishedAt,
                    "src": mainImage.asset->url,
                    "body": body
                }`);
                const url = `https://${projectId}.api.sanity.io/v2024-03-09/data/query/${dataset}?query=${query}`;
                
                const res = await fetch(url).then(r => r.json());
                const post = res.result;

                if (!post) {
                    target.innerHTML = '<h2>Articolo non trovato.</h2>';
                    return;
                }

                const date = new Date(post.publishedAt).toLocaleDateString('it-IT', {
                    day: '2-digit',
                    month: 'long',
                    year: 'numeric'
                });

                // Simple block content to HTML converter for demonstration
                const bodyHtml = post.body.map(block => {
                    if (block._type === 'block') {
                        const text = block.children.map(c => c.text).join('');
                        if (block.style === 'h2') return `<h2>${text}</h2>`;
                        return `<p>${text}</p>`;
                    }
                    return '';
                }).join('');

                target.innerHTML = `
                    <header class="post-header reveal active">
                        <span class="post-date">${date}</span>
                        <h1 class="post-title">${post.title}</h1>
                    </header>
                    <div class="post-main-image reveal active">
                        <img src="${post.src}" alt="${post.title}">
                    </div>
                    <div class="post-content reveal active">
                        ${bodyHtml}
                    </div>
                `;

            } catch (err) {
                console.error(err);
                target.innerHTML = '<h2>Errore nel caricamento.</h2>';
            }
        });
    </script>
</body>

</html>
