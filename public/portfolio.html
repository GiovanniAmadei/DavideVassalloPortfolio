        content="Portfolio fotografico di Davide Vassallo — Fotografia, Videomaking, Regia, Mosaico. Galleria completa con lavori professionali.">
    <title>Portfolio | Davide Vassallo</title>
    <link rel="stylesheet" href="styles.css?v=11">
</head>

<body>

    <!-- HEADER -->
    <header class="site-header">
        <div class="header-main">
            <a class="header-logo" href="index.html">Davide Vassallo</a>
            <button class="mobile-menu-toggle" id="mobile-menu-toggle" aria-label="Toggle Menu">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <nav class="header-nav" id="header-nav">
                <a href="index.html">Home</a>
                <span class="nav-separator">&bull;</span>
                <a href="portfolio.html" id="portfolio-toggle" class="active">Portfolio</a>
                <span class="nav-separator">&bull;</span>
                <a href="#">Blog</a>
                <span class="nav-separator">&bull;</span>
                <a href="about.html">Chi Sono</a>
                <span class="nav-separator">&bull;</span>
                <a href="contact.html">Contatti</a>
                <span class="nav-separator">&bull;</span>
                <a href="#">Cerca</a>
            </nav>
            <div class="header-social">
                <a href="https://instagram.com" target="_blank" rel="noopener" aria-label="Instagram">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
                        stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="2" width="20" height="20" rx="5" ry="5"></rect>
                        <circle cx="12" cy="12" r="4.5"></circle>
                        <circle cx="17.5" cy="6.5" r="1" fill="currentColor" stroke="none"></circle>
                    </svg>
                </a>
                <a href="https://linkedin.com" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"></path>
                        <rect x="2" y="9" width="4" height="12"></rect>
                        <circle cx="4" cy="4" r="2"></circle>
                    </svg>
                </a>
            </div>
        </div>
        <div id="submenu-portfolio" class="header-submenu">
            <nav class="submenu-nav">
                <a href="#fotografia" class="portfolio-tab-link" data-tab="fotografia">Fotografia</a>
                <span class="nav-separator">&bull;</span>
                <a href="#videomaking" class="portfolio-tab-link" data-tab="videomaking">Videomaking</a>
                <span class="nav-separator">&bull;</span>
                <a href="#regia" class="portfolio-tab-link" data-tab="regia">Regia</a>
                <span class="nav-separator">&bull;</span>
                <a href="#mosaico" class="portfolio-tab-link" data-tab="mosaico">Mosaico</a>
            </nav>
        </div>
    </header>

    <!-- PORTFOLIO PAGE HERO (compact) -->
    <div class="portfolio-page-header">
        <p class="portfolio-page-label" id="portfolio-active-label">Fotografia</p>
        <h1 class="portfolio-page-title" id="portfolio-active-title">Fotografia</h1>
    </div>

    <!-- TAB PANELS -->

    <!-- FOTOGRAFIA -->
    <section class="portfolio-tab-panel section" id="tab-fotografia">
        <div class="foto-panels-container" id="foto-panels">
            <div class="foto-panel" data-sub="ritratti" id="foto-panel-ritratti">
                <div class="foto-panel-slider"></div>
                <h2>Ritratti</h2>
            </div>
            <div class="foto-panel" data-sub="narrazione" id="foto-panel-narrazione">
                <div class="foto-panel-slider"></div>
                <h2>Narrazione</h2>
            </div>
        </div>

        <div class="fotografia-main" id="fotografia-main" style="display: none; transition: opacity 0.5s;">
            <nav class="tertiary-nav" id="fotografia-tertiary">
                <button class="tertiary-btn active" data-filter="ritratti">Ritratti</button>
                <span class="nav-separator">&bull;</span>
                <button class="tertiary-btn" data-filter="narrazione">Narrazione</button>
            </nav>
            <div class="masonry-grid" id="masonry-grid-fotografia"></div>
        </div>
    </section>

    <!-- VIDEOMAKING -->
    <section class="portfolio-tab-panel section" id="tab-videomaking" style="display:none">
        <nav class="tertiary-nav reveal">
            <button class="tertiary-btn active filter-btn" data-filter="all">Tutto</button>
            <span class="nav-separator">&bull;</span>
            <button class="tertiary-btn filter-btn" data-filter="reportage">Reportage</button>
            <span class="nav-separator">&bull;</span>
            <button class="tertiary-btn filter-btn" data-filter="ricerca">Ricerca</button>
        </nav>
        <div class="ordered-grid" id="masonry-grid-videomaking"></div>
    </section>

    <!-- REGIA -->
    <section class="portfolio-tab-panel section" id="tab-regia" style="display:none">
        <div class="project-video-wrapper reveal active" style="margin-bottom: 4rem;">
            <!-- Placeholder for Showreel -->
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?controls=1&rel=0" allowfullscreen></iframe>
        </div>
        <div class="ordered-grid" id="masonry-grid-regia"></div>
    </section>

    <!-- MOSAICO -->
    <section class="portfolio-tab-panel section" id="tab-mosaico" style="display:none">
        <div class="masonry-grid" id="masonry-grid-mosaico"></div>
    </section>

    <!-- FOOTER -->
    <footer class="site-footer">
        <div class="footer-contact-info">
            info@davidevassallo.net <span>&bull;</span> +39 333 217 4750 <span>&bull;</span> Milano, Italia
        </div>
        <div class="footer-content">
            <div class="footer-bottom">&copy; 2026 Davide Vassallo. All rights reserved.</div>
            <a href="http://amadevs.eu" target="_blank" rel="noopener noreferrer" class="footer-powered">
                <span>Powered by</span>
                <img src="assets/amadevs.png" alt="Amadevs">
            </a>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="script.js?v=11"></script>
